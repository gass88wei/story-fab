name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-tauri:
    name: Build Tauri (${{ matrix.platform.label }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { runner: windows-latest,  target: 'x86_64-pc-windows-msvc',   label: 'Windows x64'   }
          - { runner: macos-latest,     target: 'aarch64-apple-darwin',      label: 'macOS ARM64'   }
          - { runner: macos-latest,     target: 'x86_64-apple-darwin',        label: 'macOS x64'     }
          - { runner: ubuntu-22.04,     target: 'x86_64-unknown-linux-gnu',  label: 'Linux x64'     }

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '9'

      - name: Install Linux dependencies
        if: contains(matrix.platform.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.80.0
          target: ${{ matrix.platform.target }}

      - name: Install dependencies
        run: pnpm install

      # Only one job creates the GitHub Release (macOS ARM64 runs first by alphabet)
      - name: Create GitHub Release
        if: matrix.platform.label == 'macOS ARM64'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          gh release create "${{ github.ref_name }}" \
            --title "StoryFab v$VERSION" \
            --draft \
            --notes "" \
            --repo ${{ github.repository }}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create macOS run instructions
        if: matrix.platform.label == 'macOS ARM64' || matrix.platform.label == 'macOS x64'
        run: |
          cat > "HOW-TO-RUN.txt" << 'RUNEOF'
          === StoryFab macOS Installation Instructions ===

          Because StoryFab is not signed with an Apple Developer certificate,
          you must explicitly allow it to run on your Mac:

          METHOD 1 — Easiest (Recommended):
          1. Right-click on StoryFab.app
          2. Select "Open" from the context menu
          3. macOS will show a warning popup
          4. Click "Open Anyway"
          5. StoryFab will launch ✅

          METHOD 2 — Terminal:
          1. Open Terminal (Applications → Utilities → Terminal)
          2. Copy and paste this command:
             sudo xattr -rd com.apple.quarantine "/Applications/StoryFab.app"
          3. Press Enter, enter your password when prompted
          4. Launch StoryFab from Applications normally

          METHOD 3 — System Settings:
          1. Try to open StoryFab (double-click)
          2. Go to System Settings → Privacy & Security
          3. Scroll down to "Security policy" section
          4. Click "Open Anyway" next to StoryFab
          5. Launch StoryFab again

          For more help: https://github.com/gass88wei/story-fab/releases
          RUNEOF

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "StoryFab v${{ github.ref_name }}"
          args: --target ${{ matrix.platform.target }}

      - name: Copy run instructions to bundle
        if: matrix.platform.label == 'macOS ARM64' || matrix.platform.label == 'macOS x64'
        run: |
          find src-tauri/target/${{ matrix.platform.target }}/release/bundle -name "*.app" -type d | while read app_path; do
            parent_dir=$(dirname "$app_path")
            cp HOW-TO-RUN.txt "$parent_dir/HOW-TO-RUN.txt"
            echo "Copied HOW-TO-RUN.txt to $parent_dir"
          done

      - name: Package macOS app bundle
        if: matrix.platform.label == 'macOS ARM64' || matrix.platform.label == 'macOS x64'
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.platform.target }}/release/bundle -name "*.app" -type d | head -1)
          echo "Found app: $APP_PATH"
          7z a -tzip "StoryFab-${{ matrix.platform.label }}.zip" "$APP_PATH"
          echo "Packaged: StoryFab-${{ matrix.platform.label }}.zip"
          ls -lh "StoryFab-${{ matrix.platform.label }}.zip"

      - name: Package Linux AppImage
        if: matrix.platform.label == 'Linux x64' || matrix.platform.label == 'Linux ARM64'
        run: |
          APPIMAGE=$(find src-tauri/target/${{ matrix.platform.target }}/release/bundle -name "*.AppImage" | head -1)
          echo "Found: $APPIMAGE"
          SIZE=$(stat -c %s "$APPIMAGE" 2>/dev/null || stat -f %z "$APPIMAGE")
          echo "Original size: $(echo "scale=1; $SIZE/1024/1024/1024" | bc) GB"
          # Compress if larger than 1.5 GB (stay safely under 2 GB GitHub limit)
          if [ "$SIZE" -gt 1610612736 ]; then
            echo "Large AppImage — compressing with 7z..."
            7z a -t7z "StoryFab-${{ matrix.platform.label }}.7z" "$APPIMAGE" -mx9
            ls -lh "StoryFab-${{ matrix.platform.label }}.7z"
          else
            mv "$APPIMAGE" "StoryFab-${{ matrix.platform.label }}.AppImage"
            ls -lh "StoryFab-${{ matrix.platform.label }}.AppImage"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: StoryFab-${{ matrix.platform.label }}
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.msi
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.rpm
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/**/*.AppImage
            StoryFab-${{ matrix.platform.label }}.zip
            StoryFab-${{ matrix.platform.label }}.7z
            HOW-TO-RUN.txt
          retention-days: 7

  upload-assets:
    name: Upload Release Assets
    needs: [build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== All artifacts ==="
          find artifacts -type f | while read f; do echo "$f ($(du -h "$f" | cut -f1))"; done

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.zip" -o -name "*.7z" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" -o -name "HOW-TO-RUN.txt" \) -print0 | while IFS= read -r -d '' artifact; do
            echo "Uploading $artifact..."
            gh release upload "${{ github.ref_name }}" "$artifact" --clobber --repo ${{ github.repository }}
          done

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" --repo ${{ github.repository }} --json uploadUrl --jq .uploadUrl
          gh release edit "${{ github.ref_name }}" --draft=false --repo ${{ github.repository }}