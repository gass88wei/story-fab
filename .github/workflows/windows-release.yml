name: Windows Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v2.0.1). Leave empty to auto-generate from package.json'
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate (TypeCheck + Lint + Test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript check
        run: pnpm run type-check

      - name: Lint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:run

  build-windows:
    name: Build Windows (NSIS + MSI)
    needs: validate
    runs-on: windows-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Get version from package.json
        id: get-version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $version = $pkg.version
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT
          Write-Output "StoryFab version: $version"

      - name: Setup code signing certificate (optional)
        if: secrets.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:CERTIFICATE_BASE64)
          [System.IO.File]::WriteAllBytes("certificate.pfx", $certBytes)
          Write-Output "Certificate decoded and ready for code signing"

      - name: Build Tauri for Windows
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc
          certificatePath: ${{ secrets.WINDOWS_CERTIFICATE && 'certificate.pfx' || '' }}
          certificatePassword: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - name: List built installers
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Path "src-tauri/target/x86_64-pc-windows-msvc/release/bundle" | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Output "$($_.FullName) ($size MB)"
          }

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: StoryFab-Windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/**/*.msi
          retention-days: 14

  release:
    name: Publish to GitHub Releases
    needs: build-windows
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          name: StoryFab-Windows-x64
          path: artifacts

      - name: List downloaded artifacts
        shell: pwsh
        run: |
          Get-ChildItem -Recurse -Path artifacts | ForEach-Object {
            $size = [math]::Round($_.Length / 1MB, 2)
            Write-Output "$($_.FullName) ($size MB)"
          }

      - name: Determine release tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.release_tag }}") {
            $tag = "${{ github.event.inputs.release_tag }}"
          } else {
            $tag = "v${{ needs.build-windows.outputs.version }}-build-${{ github.run_number }}"
          }
          Write-Output "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Output "Release tag: $tag"

      - name: Check if release exists
        id: check-release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $exists = gh release view $tag --repo ${{ github.repository }} 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Output "exists=true" >> $env:GITHUB_OUTPUT
            Write-Output "Release $tag already exists, will update"
          } else {
            Write-Output "exists=false" >> $env:GITHUB_OUTPUT
            Write-Output "Release $tag does not exist, will create"
          }

      - name: Create or update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $exists = "${{ steps.check-release.outputs.exists }}"

          if ($exists -eq "false") {
            Write-Output "Creating release $tag..."
            gh release create $tag --title "StoryFab $tag" --notes "StoryFab Windows release v$tag" --repo ${{ github.repository }}
            Write-Output "Created release $tag"
          } else {
            Write-Output "Release $tag already exists, skipping creation"
          }

      - name: Upload installers to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          Get-ChildItem -Recurse -Path artifacts -Include *.exe,*.msi | ForEach-Object {
            Write-Output "Uploading $($_.Name)..."
            gh release upload $tag $_.FullName --clobber --repo ${{ github.repository }}
          }
          Write-Output "All installers uploaded to $tag"

      - name: Release summary
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $repo = "${{ github.repository }}"
          Write-Output ""
          Write-Output "========================================="
          Write-Output "  Release Published Successfully!"
          Write-Output "========================================="
          Write-Output "  Tag: $tag"
          Write-Output "  URL: https://github.com/$repo/releases/tag/$tag"
          Write-Output "========================================="
