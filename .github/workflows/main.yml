name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: TypeScript check
        run: |
          mkdir -p reports
          # Run tsc, preserve all output, but ignore its exit code
          tsc --noEmit --pretty false > reports/tsc-report.txt 2>&1 || true
          # Keep only src/ errors in the report for quality gate
          grep "^src/" reports/tsc-report.txt > reports/tsc-report-src.txt || true
          # Fail only if there are src/ errors
          if grep -q "^src/" reports/tsc-report-src.txt; then
            echo "TypeScript errors found in src/"
            cat reports/tsc-report-src.txt
            exit 1
          fi
      - name: Upload TypeScript report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: tsc-report
          path: reports/
          retention-days: 7

  typecheck-windows:
    name: TypeScript Check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: TypeScript check
        shell: pwsh
        run: |
          if (!(Test-Path reports)) { New-Item -ItemType Directory -Path reports }
          tsc --noEmit --pretty false > reports/tsc-report.txt 2>&1
          $srcErrors = Select-String -Path reports/tsc-report.txt -Pattern "^src/" -SimpleMatch
          if ($srcErrors) {
            Write-Host "TypeScript errors found in src/"
            $srcErrors | ForEach-Object { Write-Host $_.Line }
            exit 1
          }
          Write-Host "TypeScript check passed"
      - name: Upload TypeScript report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: tsc-report-windows
          path: reports/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: Create reports directory
        run: mkdir -p reports
      - name: ESLint
        run: pnpm run lint
      - name: ESLint JSON report
        run: pnpm exec eslint src --format json --output-file reports/eslint-report.json
        continue-on-error: true
      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: eslint-report
          path: reports/
          retention-days: 7

  lint-windows:
    name: Lint (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: ESLint
        shell: pwsh
        run: pnpm run lint
      - name: ESLint JSON report
        shell: pwsh
        run: |
          if (!(Test-Path reports)) { New-Item -ItemType Directory -Path reports }
          pnpm exec eslint src --format json --output-file reports/eslint-report.json
        continue-on-error: true
      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: eslint-report-windows
          path: reports/
          retention-days: 7

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: Create reports directory
        run: mkdir -p reports
      - name: Coverage with JSON reporter
        run: pnpm run test:ci
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  test-windows:
    name: Unit Tests (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: Run tests
        shell: pwsh
        run: pnpm run test:run

  quality-gate:
    name: PR Quality Gate
    needs: [lint, typecheck, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download coverage report
        uses: actions/download-artifact@v5
        with:
          name: coverage-report
          path: coverage/
      - name: Download all reports
        uses: actions/download-artifact@v5
        with:
          pattern: '!(coverage-report)'
          path: reports/
          merge-multiple: true
      - name: ESLint warnings check
        run: |
          ESLINT_COUNT=$(cat reports/eslint-report.json 2>/dev/null | grep -c '"severity":\s*1' || echo "0")
          echo "ESLint warnings: $ESLINT_COUNT"
          if [ "$ESLINT_COUNT" -gt 250 ]; then
            echo "ESLint warnings ($ESLINT_COUNT) exceed threshold of 250"
            exit 1
          fi
          echo "ESLint warnings within limit"
      - name: Coverage threshold check
        run: |
          if [ ! -f coverage/coverage-final.json ]; then
            echo "Coverage report not found, skipping check"
            exit 0
          fi
          if [ ! -f scripts/compute-coverage.py ]; then
            echo "compute-coverage.py not found, skipping check"
            exit 0
          fi
          COVERAGE=$(python3 scripts/compute-coverage.py)
          echo "Coverage: ${COVERAGE}%"
          # Coverage of 0% means no coverage data — skip instead of failing
          if [ "$COVERAGE" = "0" ] || [ -z "$COVERAGE" ]; then
            echo "No coverage data generated, skipping check"
            exit 0
          fi
          COVERAGE_INT=$(printf "%.0f" "$COVERAGE" 2>/dev/null || echo "0")
          if [ "$COVERAGE_INT" -lt 30 ]; then
            echo "Coverage (${COVERAGE}%) below threshold of 30%"
            exit 1
          fi
          echo "Coverage meets threshold"
      - name: TypeScript errors check
        run: |
          # Only check src/ files — node_modules errors are expected and ignored
          if [ -f reports/tsc-report-src.txt ]; then
            SRC_ERRORS=$(grep -c "error TS" reports/tsc-report-src.txt || echo "0")
            echo "TypeScript errors in src/: $SRC_ERRORS"
            if [ "$SRC_ERRORS" -gt 0 ]; then
              echo "TypeScript errors found in src/:"
              grep "error TS" reports/tsc-report-src.txt | head -10
              exit 1
            fi
            echo "TypeScript check passed"
          else
            echo "TypeScript src report not found (typecheck job may have passed)"
          fi

  build:
    name: Vite Build
    needs: [typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: Build
        run: pnpm run build
      - name: Bundle budget check
        run: pnpm run build:budget
      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 7

  rust:
    name: Rust Check
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install frontend dependencies
        run: pnpm install
      - name: Build frontend
        run: pnpm run build
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Cargo check
        run: |
          set -e
          cd src-tauri
          cargo --version && rustc --version
          cargo check 2>&1
      - name: Upload cargo report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: cargo-report
          path: src-tauri/target/
          retention-days: 1

  reports:
    name: Quality Reports
    needs: [lint, typecheck, coverage]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: '9'
      - name: Install dependencies
        run: pnpm install
      - name: Download all reports
        uses: actions/download-artifact@v5
        with:
          pattern: '*-report'
          path: reports/
          merge-multiple: true
      - name: List reports
        run: ls -la reports/
      - name: Run code quality dashboard
        run: |
          if [ -f scripts/code-review-dashboard.mjs ]; then
            node scripts/code-review-dashboard.mjs --json
          else
            echo "code-review-dashboard.mjs not found, skipping dashboard generation"
          fi
      - name: Upload all reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: quality-reports
          path: reports/
          retention-days: 7
